stages:
  - test
  - build
  - deploy

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  GHCR_IMAGE: ghcr.io/ninaey/space_miner
  GHCR_TAG: $GHCR_IMAGE:$CI_COMMIT_SHORT_SHA
  DEPLOY_PATH: /opt/space-colony-miner

docker_ci_checks:
  stage: test
  image: docker:27.1.1
  services:
    - docker:27.1.1-dind
  script:
    - docker build --pull -f Dockerfile.ci -t $CI_REGISTRY_IMAGE:ci-$CI_COMMIT_SHORT_SHA .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

docker_build_push:
  stage: build
  image: docker:27.1.1
  services:
    - docker:27.1.1-dind
  needs:
    - docker_ci_checks
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - |
      if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_TOKEN" ]; then
        echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
      else
        echo "GHCR credentials are not set; skipping GitHub Container Registry login."
      fi
  script:
    - docker build --pull -f Dockerfile -t "$IMAGE_TAG" .
    - docker push "$IMAGE_TAG"
    - |
      if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_TOKEN" ]; then
        docker tag "$IMAGE_TAG" "$GHCR_TAG"
        docker push "$GHCR_TAG"
      fi
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker tag "$IMAGE_TAG" "$CI_REGISTRY_IMAGE:latest"
        docker push "$CI_REGISTRY_IMAGE:latest"
        if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_TOKEN" ]; then
          docker tag "$IMAGE_TAG" "$GHCR_IMAGE:latest"
          docker push "$GHCR_IMAGE:latest"
        fi
      fi
  rules:
    - if: $CI_COMMIT_BRANCH

docker_compose_deploy:
  stage: deploy
  image: alpine:3.21
  needs:
    - docker_build_push
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$DEPLOY_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
  script:
    - test -n "$DEPLOY_SSH_HOST"
    - test -n "$DEPLOY_SSH_USER"
    - ssh -o StrictHostKeyChecking=no "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" "mkdir -p $DEPLOY_PATH/backend/migrations"
    - scp -o StrictHostKeyChecking=no docker-compose.yml "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST:$DEPLOY_PATH/docker-compose.yml"
    - scp -o StrictHostKeyChecking=no backend/migrations/init.up.sql "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST:$DEPLOY_PATH/backend/migrations/init.up.sql"
    - |
      ssh -o StrictHostKeyChecking=no "$DEPLOY_SSH_USER@$DEPLOY_SSH_HOST" "
      cd $DEPLOY_PATH &&
      echo '$CI_REGISTRY_PASSWORD' | docker login '$CI_REGISTRY' -u '$CI_REGISTRY_USER' --password-stdin &&
      APP_IMAGE='$IMAGE_TAG' docker compose pull app &&
      APP_IMAGE='$IMAGE_TAG' docker compose up -d --remove-orphans
      "
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
